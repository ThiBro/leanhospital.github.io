title: Lean Hospital
description: "Lean Hospital - efficient processes for modern healthcare"
baseurl: ""
url: "https://lean-hospital.de"
permalink: /:title:output_ext
default_lang: en
port: 4001

# Per-post permalinks set via front matter (/en/<slug>/ and /de/<slug>/)
# always take precedence over the global permalink above.

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    default_lang: html
    css_class: 'syntax'
theme: minima
plugins:
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-sitemap

# Ship these plain-text files as static assets (LLM discovery files).
include:
  - llms.txt
  - llms-full.txt

# Exclude from processing.
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - EDITOR_GUIDE.md
  - BLOG_WRITING_GUIDE.md
  - IMAGE_PROMPT_GUIDE.md
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - package.json
  - package-lock.json
  - postcss.config.js
  - tailwind.config.js
  - google8190dc559f0c8f12.html
  - scripts/
